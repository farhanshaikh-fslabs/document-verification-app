<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GCC/CPC Compliance Review{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="header">
    <a href="/review" class="brand">
      <div class="brand-icon">GC</div>
      <span class="brand-text"><span>GCC/CPC</span> Compliance Review</span>
    </a>
    {% if user %}
    <nav class="topnav">
      <a href="/review" {% if request.url.path == "/review" %}class="active"{% endif %}>Submissions</a>
      <a href="/review/new" {% if request.url.path == "/review/new" %}class="active"{% endif %}>New Upload</a>
      <a href="/direct/new"
         {% if request.url.path == "/direct/new" %}class="active"{% endif %}
         style="{% if request.url.path != '/direct/new' %}color:#a5b4fc;{% endif %}">
        Direct AI Review
      </a>
      <span class="meta-sep">|</span>
      <div class="user-chip">
        <span class="user-chip-dot" aria-hidden="true"></span>
        {{ user.email }}
      </div>
      <a href="/logout" class="btn btn-ghost btn-sm" style="margin-left:0.25rem">Logout</a>
    </nav>
    {% endif %}
  </header>
  <main class="main">{% block content %}{% endblock %}</main>
</body>
</html>
