<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GCC/CPC Compliance Review</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="main">
    <div class="card login">
      <div class="login-logo">
        <div class="logo-box">GC</div>
        <h1>GCC/CPC Compliance Review</h1>
        <p>Sign in to review compliance submissions</p>
      </div>

      {% if error %}
      <div class="info-box err">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <label>
          <span class="label-text">Email address</span>
          <input type="email" name="email" placeholder="reviewer@company.com" required autofocus />
        </label>
        <label>
          <span class="label-text">Password</span>
          <input type="password" name="password" placeholder="••••••••" required />
        </label>
        <button type="submit" class="login-submit btn btn-primary">Sign In</button>
      </form>
    </div>
  </main>
</body>
</html>
